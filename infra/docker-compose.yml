services:
  api:
    build: ../backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
      - redis
    volumes:
      - ../backend/alembic/versions:/app/alembic/versions

  worker:
    build: ../worker
    env_file:
      - .env
    depends_on:
      - redis

  db:
    image: postgres:15
    restart: always
    environment:
      POSTGRES_USER: scrap
      POSTGRES_PASSWORD: scrap
      POSTGRES_DB: scrapdb
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:8
    ports:
      - "6380:6379"

  frontend:
    build:
      context: ../frontend/ionic-app
      dockerfile: Dockerfile.dev
    ports:
      - "8100:8100"
    volumes:
      - ../frontend/ionic-app:/app
      - /app/node_modules
    environment:
      - CHOKIDAR_USEPOLLING=true

volumes:
  pgdata: