<ion-item-divider><ion-label>{{ 'add.furniture-details' | translate }}</ion-label></ion-item-divider>

<ion-item>
  <ion-label position="stacked">{{ 'item.furniture-type' | translate }}</ion-label>
  <ion-input [(ngModel)]="item.furniture_type" [placeholder]="'item.furniture-type-placeholder' | translate"></ion-input>
</ion-item>

<ion-item>
  <ion-label position="stacked">{{ 'item.material' | translate }}</ion-label>
  <ion-input [(ngModel)]="item.material" [placeholder]="'item.material-placeholder' | translate"></ion-input>
</ion-item>

<ion-item>
  <ion-label position="stacked">{{ 'item.style' | translate }}</ion-label>
  <ion-input [(ngModel)]="item.style" [placeholder]="'item.style-placeholder' | translate"></ion-input>
</ion-item>

<ion-item>
  <ion-label position="stacked">{{ 'item.num-pieces' | translate }}</ion-label>
  <ion-input [(ngModel)]="item.num_pieces" type="number" value="1"></ion-input>
</ion-item>

<ion-item>
  <ion-label>{{ 'item.hardware-included' | translate }}</ion-label>
  <ion-toggle [(ngModel)]="item.has_hardware" slot="end"></ion-toggle>
</ion-item>
